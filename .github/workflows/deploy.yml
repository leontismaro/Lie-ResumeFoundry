name: Deploy Astro to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPO_SITE_URL: ${{ vars.SITE_URL }}
      REPO_SITE_BASE: ${{ vars.SITE_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Compute site config
        run: |
          owner="$GITHUB_REPOSITORY_OWNER"
          repo="${GITHUB_REPOSITORY#*/}"

          site_url="${REPO_SITE_URL:-https://${owner}.github.io}"

          if [ -n "$REPO_SITE_BASE" ]; then
            site_base="$REPO_SITE_BASE"
          elif [ "$repo" = "${owner}.github.io" ]; then
            site_base="/"
          else
            site_base="/$repo"
          fi

          echo "SITE_URL=$site_url" >> "$GITHUB_ENV"
          echo "SITE_BASE=$site_base" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
